<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class Legends Awards</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Trebuchet MS',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);
    overflow:hidden;
}

.container{
    width:90%;
    max-width:900px;
    text-align:center;
}

.header{
    color:white;
    font-size:2rem;
    font-weight:bold;
    margin-bottom:20px;
    text-shadow:2px 2px 5px rgba(0,0,0,0.2);
}

.card{
    background:white;
    padding:60px 40px;
    border-radius:30px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    animation:fadeIn 0.6s ease;
}

.progress{
    color:#666;
    font-size:1.2rem;
    margin-bottom:25px;
}

.emoji{
    font-size:4rem;
    margin-bottom:15px;
}

.question{
    font-size:3rem;
    color:#333;
    font-weight:bold;
    margin-bottom:35px;
    min-height:120px;
}

.subtitle{
    font-size:1.3rem;
    color:#777;
    margin-bottom:35px;
}

button{
    padding:15px 40px;
    border:none;
    border-radius:50px;
    background:#6c63ff;
    color:white;
    font-size:1.2rem;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.08);
    background:#5146ff;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.footer{
    margin-top:20px;
    color:white;
    font-size:1rem;
}

.complete{
    font-size:3rem;
    color:#6c63ff;
    font-weight:bold;
}

.complete-sub{
    margin-top:20px;
    font-size:1.5rem;
    color:#555;
}
</style>

</head>
<body>

<div class="container">

    <div class="header">
        🏆 CLASS LEGENDS AWARDS 🏆
    </div>

    <div class="card">

        <div class="progress" id="progress">1 / 10</div>

        <div class="emoji" id="emoji">🚽</div>

        <div class="question" id="question">
            Mr/Ms Toilet
        </div>

        <div class="subtitle">
            Everyone must agree on ONE person!
        </div>

        <button onclick="nextQuestion()">
            Next ➜
        </button>

    </div>

    <div class="footer">
        Vote wisely. No changing your mind later! 😆
    </div>

</div>

<script>

const awards = [

{emoji:"🚽", title:"Teacher's Toilet"},
{emoji:"⏰", title:"Mr./Ms. Late"},
{emoji:"🎤", title:"Future K-Pop Star"},
{emoji:"🧠", title:"Smartest Brain"},
{emoji:"🙏", title:"Most Polite"},
{emoji:"😂", title:"Class Comedian"},
{emoji:"💬", title:"Can't Stop Talking"},
{emoji:"📚", title:"Teacher's Favourite"},
{emoji:"😴", title:"Most Likely Sleeping Internally"},
{emoji:"🌟", title:"Future Millionaire"}

];

let current = 0;

function nextQuestion(){

    current++;

    if(current >= awards.length){

        document.querySelector(".card").innerHTML = `
        <div class="emoji">🎉</div>
        <div class="complete">CLASS LEGENDS COMPLETE!</div>
        <div class="complete-sub">
        Every legend has been identified.<br><br>
        Give yourselves a round of applause 👏👏👏
        </div>
        `;
        return;
    }

    document.getElementById("progress").innerText =
        (current+1) + " / " + awards.length;

    document.getElementById("emoji").innerText =
        awards[current].emoji;

    document.getElementById("question").innerText =
        awards[current].title;
}

</script>

</body>
</html>
